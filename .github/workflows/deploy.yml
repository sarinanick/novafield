name: NovaField CI/CD — Darakub

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  GO_VERSION: "1.23"
  NODE_VERSION: "20"
  DARAKUB_API: "https://api.darakub.com"
  DARAKUB_KEY: ${{ secrets.DARAKUB_API_KEY }}

jobs:
  # ── Backend Lint ────────────────────────────────────
  backend-lint:
    name: Backend Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: backend/go.sum
      - run: go vet ./...

  # ── Backend Test ────────────────────────────────────
  backend-test:
    name: Backend Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: backend/go.sum
      - run: go test ./handlers/ -v -count=1 -timeout 120s

  # ── Frontend Lint & Typecheck ───────────────────────
  frontend-check:
    name: Frontend Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit

  # ── Build Docker Images ─────────────────────────────
  build-images:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [backend-lint, backend-test, frontend-check]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    strategy:
      matrix:
        include:
          - context: ./backend
            image: novafield-backend
            tag: backend
          - context: ./frontend
            image: novafield-frontend
            tag: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          push: false
          load: true
          tags: novafield/${{ matrix.image }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Save image as artifact
        run: |
          docker save novafield/${{ matrix.image }}:${{ github.sha }} | gzip > /tmp/${{ matrix.tag }}.tar.gz

      - uses: actions/upload-artifact@v4
        with:
          name: docker-${{ matrix.tag }}
          path: /tmp/${{ matrix.tag }}.tar.gz
          retention-days: 1

  # ── Deploy Backend to Darakub ───────────────────────
  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    needs: build-images
    environment:
      name: production
      url: ${{ vars.DARAKUB_BACKEND_URL }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: docker-backend
          path: /tmp

      - name: Load and push image
        run: |
          docker load < /tmp/backend.tar.gz
          docker tag novafield-backend:${{ github.sha }} registry.darakub.com/novafield/backend:${{ github.sha }}
          docker tag novafield-backend:${{ github.sha }} registry.darakub.com/novafield/backend:latest
          echo "${{ secrets.DARAKUB_REGISTRY_PASS }}" | docker login registry.darakub.com -u darakub --password-stdin
          docker push registry.darakub.com/novafield/backend:${{ github.sha }}
          docker push registry.darakub.com/novafield/backend:latest

      - name: Deploy via Darakub API
        run: |
          curl -s -X POST "${{ env.DARAKUB_API }}/api/v1/services/deploy" \
            -H "Authorization: Api-key ${{ env.DARAKUB_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{
              "serviceName": "novafield-backend",
              "image": "registry.darakub.com/novafield/backend:${{ github.sha }}",
              "env": {
                "PORT": "3001",
                "FRONTEND_URL": "${{ vars.FRONTEND_URL }}",
                "CORS_ORIGINS": "${{ vars.CORS_ORIGINS }}"
              },
              "resources": {
                "cpu": "1000m",
                "memory": "512Mi"
              },
              "healthCheck": {
                "path": "/api/v1/health",
                "port": 3001,
                "interval": 30
              }
            }'

      - name: Wait for deployment
        run: |
          echo "Waiting for backend to be ready..."
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              -H "Authorization: Api-key ${{ env.DARAKUB_KEY }}" \
              "${{ env.DARAKUB_API }}/api/v1/services/novafield-backend/status" || true)
            if [ "$STATUS" = "200" ]; then
              echo "Backend is ready!"
              exit 0
            fi
            echo "Attempt $i/30 — status: $STATUS"
            sleep 10
          done
          echo "Deployment timed out"
          exit 1

      - name: Health check
        run: |
          sleep 5
          curl -sf "${{ vars.DARAKUB_BACKEND_URL }}/api/v1/health" || exit 1
          echo "Backend health check passed!"

  # ── Deploy Frontend to Darakub ──────────────────────
  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: [build-images, deploy-backend]
    environment:
      name: production
      url: ${{ vars.DARAKUB_FRONTEND_URL }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: docker-frontend
          path: /tmp

      - name: Load and push image
        run: |
          docker load < /tmp/frontend.tar.gz
          docker tag novafield-frontend:${{ github.sha }} registry.darakub.com/novafield/frontend:${{ github.sha }}
          docker tag novafield-frontend:${{ github.sha }} registry.darakub.com/novafield/frontend:latest
          echo "${{ secrets.DARAKUB_REGISTRY_PASS }}" | docker login registry.darakub.com -u darakub --password-stdin
          docker push registry.darakub.com/novafield/frontend:${{ github.sha }}
          docker push registry.darakub.com/novafield/frontend:latest

      - name: Deploy via Darakub API
        run: |
          curl -s -X POST "${{ env.DARAKUB_API }}/api/v1/services/deploy" \
            -H "Authorization: Api-key ${{ env.DARAKUB_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{
              "serviceName": "novafield-frontend",
              "image": "registry.darakub.com/novafield/frontend:${{ github.sha }}",
              "env": {
                "NEXT_PUBLIC_API_URL": "${{ vars.NEXT_PUBLIC_API_URL }}",
                "NEXT_PUBLIC_WS_URL": "${{ vars.NEXT_PUBLIC_WS_URL }}"
              },
              "resources": {
                "cpu": "500m",
                "memory": "512Mi"
              },
              "healthCheck": {
                "path": "/",
                "port": 3000,
                "interval": 30
              }
            }'

      - name: Wait for deployment
        run: |
          echo "Waiting for frontend to be ready..."
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              -H "Authorization: Api-key ${{ env.DARAKUB_KEY }}" \
              "${{ env.DARAKUB_API }}/api/v1/services/novafield-frontend/status" || true)
            if [ "$STATUS" = "200" ]; then
              echo "Frontend is ready!"
              exit 0
            fi
            echo "Attempt $i/30 — status: $STATUS"
            sleep 10
          done
          echo "Deployment timed out"
          exit 1

      - name: Health check
        run: |
          sleep 5
          curl -sf "${{ vars.DARAKUB_FRONTEND_URL }}" || exit 1
          echo "Frontend health check passed!"

  # ── Notify ──────────────────────────────────────────
  notify:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-frontend]
    if: always()
    steps:
      - name: Deployment status
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Service | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Backend | ${{ needs.deploy-backend.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend | ${{ needs.deploy-frontend.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Commit: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "Branch: \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
