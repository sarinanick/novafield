version: "3.9"

services:
  backend:
    image: ${CI_REGISTRY_IMAGE:-registry.hamgit.ir/alitabaei7/novafield}:latest
    container_name: novafield-staging
    ports:
      - "3002:3001"
    environment:
      - PORT=3001
      - NODE_ENV=staging
    volumes:
      - ./data/novafield.json:/app/novafield.json
      - ./data/uploads:/app/uploads
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
