stages:
  - lint
  - test
  - build
  - docker
  - deploy

variables:
  DOCKER_IMAGE: "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA"
  DOCKER_LATEST: "$CI_REGISTRY_IMAGE:latest"
  GOPROXY: "direct"

# ── Lint ──────────────────────────────────────────────

go-vet:
  stage: lint
  image: golang:1.25-alpine
  script:
    - go vet ./...
  rules:
    - if: $CI_MERGE_REQUEST_IID
    - if: $CI_COMMIT_BRANCH == "master"

# ── Test ──────────────────────────────────────────────

go-test:
  stage: test
  image: golang:1.25-alpine
  variables:
    CGO_ENABLED: "1"
  before_script:
    - apk add --no-cache gcc musl-dev
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - .go-cache/
  script:
    - mkdir -p .go-cache
    - export GOPATH="$CI_PROJECT_DIR/.go-cache"
    - go test ./handlers/ -v -count=1 -timeout 120s 2>&1
  artifacts:
    when: always
    expire_in: 7 days
  rules:
    - if: $CI_MERGE_REQUEST_IID
    - if: $CI_COMMIT_BRANCH == "master"

# ── Build ─────────────────────────────────────────────

go-build:
  stage: build
  image: golang:1.25-alpine
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - .go-cache/
  script:
    - export GOPATH="$CI_PROJECT_DIR/.go-cache"
    - CGO_ENABLED=0 GOOS=linux go build -o novafield-api .
    - ./novafield-api &
    - sleep 3
    - wget --no-verbose --tries=3 --spider http://127.0.0.1:3001/api/v1/health || exit 1
    - kill %1
  artifacts:
    paths:
      - novafield-api
    expire_in: 7 days
  rules:
    - if: $CI_COMMIT_BRANCH == "master"

# ── Docker Build & Push ──────────────────────────────

docker-build:
  stage: docker
  image: docker:24
  variables:
    DOCKER_HOST: unix:///var/run/docker.sock
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
  script:
    - docker build -t "$DOCKER_IMAGE" -t "$DOCKER_LATEST" .
    - docker push "$DOCKER_IMAGE"
    - docker push "$DOCKER_LATEST"
  rules:
    - if: $CI_COMMIT_BRANCH == "master"

# ── Deploy Staging ────────────────────────────────────

deploy-staging:
  stage: deploy
  image: alpine:3.19
  before_script:
    - apk add --no-cache openssh-client curl
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - echo "$SSH_KNOWN_HOSTS" >> ~/.ssh/known_hosts
  script:
    - |
      ssh $STAGING_USER@$STAGING_HOST << 'DEPLOY_SCRIPT'
        cd /opt/novafield
        docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY" || true
        docker-compose -f docker-compose.staging.yml pull
        docker-compose -f docker-compose.staging.yml down
        docker-compose -f docker-compose.staging.yml up -d
        sleep 10
        curl -sf http://localhost:3002/api/v1/health
        echo "Staging deployment successful!"
      DEPLOY_SCRIPT
  environment:
    name: staging
    url: http://$STAGING_HOST:3002
  rules:
    - if: $CI_COMMIT_BRANCH == "master"

# ── Deploy Production ─────────────────────────────────

deploy-production:
  stage: deploy
  image: alpine:3.19
  before_script:
    - apk add --no-cache openssh-client curl
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - echo "$SSH_KNOWN_HOSTS" >> ~/.ssh/known_hosts
  script:
    - |
      ssh $PROD_USER@$PROD_HOST << 'DEPLOY_SCRIPT'
        cd /opt/novafield
        docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY" || true
        docker-compose -f docker-compose.production.yml pull
        docker-compose -f docker-compose.production.yml down
        docker-compose -f docker-compose.production.yml up -d
        sleep 10
        curl -sf http://localhost:3001/api/v1/health
        echo "Production deployment successful!"
      DEPLOY_SCRIPT
  environment:
    name: production
    url: http://$PROD_HOST:3001
  when: manual
  rules:
    - if: $CI_COMMIT_BRANCH == "master"
